[agent]
  interval = "15s"
  flush_interval = "10s"
  omit_hostname = true

# Scrape Prometheus exposition endpoints and store time series in InfluxDB.
[[inputs.prometheus]]
  urls = [
    "http://cadvisor:8080/metrics",
    "http://prometheus:9090/metrics"
  ]
  metric_version = 2

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUX_TOKEN}"
  organization = "manet"
  bucket = "metrics"
