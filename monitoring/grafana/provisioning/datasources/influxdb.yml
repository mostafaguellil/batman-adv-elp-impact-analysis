apiVersion: 1

datasources:
  - name: InfluxDB
    uid: influxdb-metrics
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: false
    editable: false
    jsonData:
      httpMode: POST
      version: Flux
      organization: manet
      defaultBucket: metrics
    secureJsonData:
      token: manet-dev-admin-token-change-me
